name: Build and push to Cachix

on:
  push:
    branches: [main]
    paths: &paths
      - pkgs/**
      - modules/**
      - tests/**
      - flake.nix
      - flake.lock
      - overlay.nix
      - default.nix
      - shell.nix
      - .github/workflows/build.yml
  pull_request:
    paths: *paths
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      # NixOS VM tests need an accelerator. x86 runners expose /dev/kvm but not
      # group-writable by default; this rule fixes the permissions. ARM hosted
      # runners have no /dev/kvm at all, so QEMU's `accel=kvm:tcg` falls back to
      # (slower) TCG software emulation there -- the rule is then a harmless no-op.
      - name: Enable KVM
        # Only x86 runners have /dev/kvm; ARM has none, so the VM test there runs
        # under TCG emulation and this step would fail (no kvm device to trigger).
        if: matrix.system == 'x86_64-linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            # Advertise the kvm feature so the VM test is schedulable on ARM
            # runners (which lack /dev/kvm); QEMU falls back to TCG at runtime.
            extra-system-features = kvm
            extra-substituters = https://awildleon-nixos-pbs.cachix.org
            extra-trusted-public-keys = awildleon-nixos-pbs.cachix.org-1:4kEEBSONGJ0F7Ita/3ZRcTWaR6M7YHXhltJaoEYl3ew=

      - name: Configure Cachix for pulls
        if: github.event_name == 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: awildleon-nixos-pbs
          skipPush: true

      - name: Configure Cachix for pulls and pushes
        if: github.event_name != 'pull_request'
        uses: cachix/cachix-action@v17
        with:
          name: awildleon-nixos-pbs
          authToken: ${{ secrets.CACHIX }}
          skipPush: true

      - name: Build packages for ${{ matrix.system }}
        env:
          PACKAGES: |
            proxmox-backup-server
            proxmox-backup-server-fhs
        run: |
          : > builds.txt
          echo "$PACKAGES" | while read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "::group::Building $pkg"
            out=$(nix build --print-build-logs --print-out-paths \
              ".#packages.${{ matrix.system }}.$pkg")
            printf '%s %s\n' "$pkg" "$out" >> builds.txt
            echo "::endgroup::"
          done

      # Gate publishing on the VM test: this runs for both x86_64 and aarch64
      # (the latter under TCG emulation, so it is slower). If it fails, the push
      # step below is skipped and nothing is published for this system.
      - name: Integration test (${{ matrix.system }})
        run: |
          nix build --print-build-logs ".#checks.${{ matrix.system }}.integration"

      - name: Push and pin to Cachix (keep last 2 per package)
        # Only on non-PR events, and only if the build + integration test passed.
        if: success() && github.event_name != 'pull_request'
        run: |
          # Upload the freshly built paths.
          cut -d' ' -f2- builds.txt | cachix push awildleon-nixos-pbs
          # Pin each artifact under a stable per-package/system name, retaining
          # only the two most recent revisions. Older revisions become unpinned
          # and are reclaimed by Cachix's (size-based) garbage collection, so the
          # cache keeps just the last two builds of each package per system.
          while read -r pkg out; do
            cachix pin awildleon-nixos-pbs \
              "${pkg}-${{ matrix.system }}" "$out" --keep-revisions 2
          done < builds.txt
